<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panda Cut</title>
    <style>
        :root {
            color-scheme: light;
            --bg: #ffffff;
            --text: #111111;
            --surface: rgba(0,0,0,0.04);
        }
        * {
            box-sizing: border-box;
        }
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background: var(--bg);
            color: var(--text);
            font-family: "Inter", Arial, sans-serif;
            text-align: center;
        }
        .hero {
            width: min(100%, 900px);
            padding: 2rem;
        }
        .hero__logo {
            display: block;
            max-width: 420px;
            width: 85%;
            height: auto;
            margin: 0 auto 2rem;
        }
        .hero__title {
            font-size: clamp(3.5rem, 8vw, 6rem);
            line-height: 0.95;
            letter-spacing: -0.05em;
            margin: 0;
            font-weight: 800;
        }
        .hero__note {
            margin: 1.5rem auto 0;
            color: rgba(0, 0, 0, 0.6);
            font-size: 1rem;
            max-width: 26rem;
        }
    </style>
</head>
<body>
    <main class="hero">
        <img src="panda-cut-hero.png" alt="Panda Cut Logo" class="hero__logo" />
        <h1 class="hero__title">Panda Cut</h1>
    </main>
</body>
</html>
